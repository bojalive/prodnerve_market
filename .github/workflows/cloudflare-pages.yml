name: Deploy to Cloudflare Pages
on:
  push:
    branches:
      - 'deploys-*'
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - id: slug
        run: |
          SLUG="${GITHUB_REF_NAME#deploys-}"
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
      - name: Create NerveCenter project
        continue-on-error: true
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${{ steps.slug.outputs.slug }}-nervecenter\",\"production_branch\":\"main\"}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy NerveCenter
        run: npx wrangler@latest pages deploy dist-nervecenter --project-name "${{ steps.slug.outputs.slug }}-nervecenter" --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
